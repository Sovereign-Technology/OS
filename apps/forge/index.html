<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⬡ SOVEREIGN — Forge Platform</title>
  <meta name="description" content="Sovereign Forge — social, studio, and marketplace. Build and publish sovereign apps." />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
                 font-src 'self'; connect-src 'self' http://localhost:11434 ws: wss: https:;
                 img-src 'self' data: blob:;" />
  <style>
    :root {
      --bg-void:#030306; --bg-surface:#070a0f; --bg-raised:#0c1018; --bg-panel:#101620;
      --accent-green:#00e87c; --accent-cyan:#00c8ff; --accent-amber:#ffb020;
      --accent-red:#ff4040; --accent-purple:#c060ff;
      --text-primary:#dce8f4; --text-muted:#4a5e72;
      --border:rgba(0,232,124,0.10);
      --font-mono:"ui-monospace","Cascadia Code","Menlo","Consolas",monospace;
      --font-display:"system-ui","-apple-system","BlinkMacSystemFont",sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; background:var(--bg-void); color:var(--text-primary);
                 font-family:var(--font-mono); font-size:12px; line-height:1.6; overflow:hidden; }
    body::after { content:''; position:fixed; inset:0;
                  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);
                  pointer-events:none; z-index:9997; }

    #sovereign-boot { position:fixed; inset:0; display:flex; flex-direction:column;
                      align-items:center; justify-content:center; gap:20px;
                      background:var(--bg-void); z-index:9998; transition:opacity .4s ease; }
    #sovereign-boot.hidden { opacity:0; pointer-events:none; }
    .boot-hex { width:52px; height:52px; animation:boot-pulse 1.8s ease-in-out infinite;
                filter:drop-shadow(0 0 18px rgba(0,200,255,0.5)); }
    @keyframes boot-pulse { 0%,100%{opacity:.6;transform:scale(.97)} 50%{opacity:1;transform:scale(1.03)} }
    .boot-title { font-family:var(--font-display); font-size:18px; font-weight:800;
                  color:var(--accent-cyan); letter-spacing:.12em; }
    .boot-subtitle { font-size:9px; color:var(--text-muted); letter-spacing:.2em; text-transform:uppercase; }
    .boot-log { font-size:10px; color:var(--text-muted); letter-spacing:.06em; height:14px; transition:color .2s; }
    .boot-log.ok { color:var(--accent-cyan); }
    .boot-log.error { color:var(--accent-red); }
    .boot-bar-track { width:200px; height:2px; background:rgba(0,200,255,.12); border-radius:2px; overflow:hidden; }
    .boot-bar-fill { height:100%; background:var(--accent-cyan); border-radius:2px; width:0%;
                     transition:width .3s ease; box-shadow:0 0 8px rgba(0,200,255,.6); }
    #sovereign-app { width:100%; height:100%; }
  </style>
</head>
<body>

  <!-- Boot screen -->
  <div id="sovereign-boot" role="status" aria-live="polite">
    <svg class="boot-hex" viewBox="0 0 52 60" fill="none">
      <path d="M26 2 L50 15 L50 45 L26 58 L2 45 L2 15 Z" stroke="#00c8ff" stroke-width="1.5" fill="none" opacity=".4"/>
      <path d="M26 10 L44 20 L44 40 L26 50 L8 40 L8 20 Z" stroke="#00c8ff" stroke-width="1" fill="none" opacity=".6"/>
      <path d="M26 18 L38 25 L38 35 L26 42 L14 35 L14 25 Z" fill="rgba(0,200,255,.15)" stroke="#00c8ff" stroke-width="1.5"/>
    </svg>
    <div class="boot-title">FORGE</div>
    <div class="boot-subtitle">Sovereign Platform</div>
    <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar"></div></div>
    <div class="boot-log" id="boot-log">Initializing sovereign stack…</div>
  </div>

  <!-- App mount point -->
  <div id="sovereign-app"></div>

  <!--
    SOVEREIGN STACK — strict load order, do not reorder
    Forge uses the full stack minus sovereign_kernel.js (optional — add if
    OS-level authority routing is needed for advanced marketplace features).
  -->
  <script src="../../sovereign-sdk/src/sovereign_shamir.js"></script>
  <script src="../../sovereign-sdk/src/sovereign_security.js"></script>
  <script src="../../sovereign-kernel/src/sovereign_fsm.js"></script>
  <script src="../../sovereign-runtime/src/transport.js"></script>
  <script src="./index.js"></script>

  <!-- Boot sequence -->
  <script>
    (function () {
      const bar = document.getElementById('boot-bar');
      const log = document.getElementById('boot-log');
      const boot = document.getElementById('sovereign-boot');
      const steps = [
        { pct:25,  msg:'✓ SDK loaded',       check:()=>typeof window.sanitize!=='undefined' },
        { pct:50,  msg:'✓ FSM kernel ready', check:()=>typeof window.SovereignFSM!=='undefined' },
        { pct:75,  msg:'✓ Transport ready',  check:()=>typeof window.SovereignTransport!=='undefined' },
        { pct:100, msg:'✓ Forge online' },
      ];
      let i = 0;
      const tick = () => {
        if (i >= steps.length) { setTimeout(()=>boot.classList.add('hidden'),400); return; }
        const s = steps[i++];
        bar.style.width = s.pct + '%';
        if (s.check && !s.check()) {
          log.textContent = '✗ ' + s.msg.replace('✓ ','') + ' — check console';
          log.className = 'boot-log error'; return;
        }
        log.textContent = s.msg;
        log.className = 'boot-log ok';
        setTimeout(tick, 180);
      };
      window.addEventListener('DOMContentLoaded', ()=>setTimeout(tick,100));
    })();
  </script>

</body>
</html>
